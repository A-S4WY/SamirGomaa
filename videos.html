<script>
const videoAlbums = [
  {
    title: "Dusit Setup",
    thumbnail: "",
    videos: [
      "video/dusit/dusit1.mp4",
      "video/dusit/dusit2.mp4",
      "video/dusit/dusit3.mp4",
      "video/dusit/dusit4.mp4",
      "video/dusit/dusit5.mp4",

    ]
  },
     {
    title: "Ritz Garden Setup",
    thumbnail: "",
    videos: [
      "video/ritz_garden/ritz1.mp4",
       "video/ritz_garden/ritz2.mp4",
      "video/ritz_garden/ritz3.mp4",
      "video/ritz_garden/ritz4.mp4",
      "video/ritz_garden/ritz5.mp4",


    ]
  },
  {
    title: "Cairo Hall Setup",
    thumbnail: "",
    videos: [
      "video/cairohall/cairohall1.mp4",
      "video/cairohall/cairohall2.mp4",
      "video/cairohall/cairohall3.mp4",

    ]
  },
    {
    title: "Pyramids Setup",
    thumbnail: "",
    videos: [
      "video/pyramids/pyramids1.mp4",
      "video/pyramids/pyramids2.mp4",
      "video/pyramids/pyramids3.mp4",

    ]
  },
    {
    title: "Lakeview Setup",
    thumbnail: "",
    videos: [
      "video/lakeview/lakeview1.mp4",
      "video/lakeview/lakeview2.mp4",
      "video/lakeview/lakeview3.mp4",

    ]
  },
    {
    title: "Le Lac Du Caire Setup",
    thumbnail: "",
    videos: [
      "video/lac_du_caire/lac_du_caire1.mp4",
      "video/lac_du_caire/lac_du_caire2.mp4",
      "video/lac_du_caire/lac_du_caire3.mp4",

    ]
  },
      {
    title: "ST. Regis Setup",
    thumbnail: "",
    videos: [
      "video/st_regis.mp4",
    ]
  },
        {
    title: "The Vie Setup",
    thumbnail: "",
    videos: [
      "video/the_vie.mp4",
    ]
  },
        {
    title: "JWM Setup",
    thumbnail: "",
    videos: [
      "video/jwm.mp4",
    ]
  },
  
 
  
];

// ELEMENTS
const albumList = document.getElementById("album-list");
const albumView = document.getElementById("album-view");
const albumTitle = document.getElementById("album-title");
const videosContainer = document.getElementById("videos");

const videoBox = document.getElementById("video-lightbox");
const videoPlayer = document.getElementById("lightbox-video");

// 🧱 RENDER ALBUMS
function renderAlbums() {
  albumList.innerHTML = "";

  videoAlbums.forEach((album, index) => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
<video src="${album.videos[0]}" preload muted autoplay></video>
      <h3>${album.title}</h3>
    `;

    div.onclick = () => openAlbum(index);

    albumList.appendChild(div);
  });
}

renderAlbums();

// 📂 OPEN ALBUM
function openAlbum(index) {
  const album = videoAlbums[index];

  albumList.classList.add("hidden");
  albumView.classList.remove("hidden");

  albumTitle.textContent = album.title;
  videosContainer.innerHTML = "";

  album.videos.forEach(video => {
    const div = document.createElement("div");
    div.className = "video-item";

    // use video preview
    const vid = document.createElement("video");
    vid.src = video;
    vid.muted = true;
    vid.autoplay = true;
    vid.preload = true;
    div.appendChild(vid);

    div.onclick = () => openVideo(video);

    videosContainer.appendChild(div);
  });
}

// 🔙 BACK
function goBack() {
  albumView.classList.add("hidden");
  albumList.classList.remove("hidden");
}

// 🎬 OPEN VIDEO
function openVideo(src) {
  videoBox.classList.remove("hidden");
  videoPlayer.src = src;
}

// ❌ CLOSE VIDEO
function closeVideo() {
  videoBox.classList.add("hidden");
  videoPlayer.pause();
  videoPlayer.src = "";
}

// ⌨️ ESC CLOSE
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeVideo();
});

// 🖱️ CLICK OUTSIDE CLOSE
videoBox.addEventListener("click", (e) => {
  if (e.target === videoBox) closeVideo();
});

</script>
